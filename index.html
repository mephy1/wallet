<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f1216">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Бюджет</title>
<style>
  :root{
    --bg:#0f1216; --panel:#171c22; --panel2:#1f262e; --line:#2a323c;
    --txt:#e7edf3; --muted:#8b97a5; --accent:#4da3ff; --accent2:#3a4550;
    --good:#36c46b; --bad:#ff6b6b;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    background:var(--bg); color:var(--txt);
    font-family:-apple-system,Roboto,"Segoe UI",system-ui,sans-serif;
    overflow:hidden; user-select:none;
  }
  #app{display:flex;flex-direction:column;height:100dvh;max-width:560px;margin:0 auto;position:relative;}

  /* ---- top / line chart ---- */
  .top{flex:0 0 auto;background:var(--panel);border-bottom:1px solid var(--line);padding:8px 10px 6px;position:relative;}
  .gear{background:none;border:none;color:var(--muted);font-size:24px;line-height:1;padding:2px 4px;margin-left:auto;}
  .nav{display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .nav .arrow{width:46px;height:46px;border:none;border-radius:12px;background:var(--panel2);color:var(--txt);font-size:22px;flex:0 0 auto;}
  .nav .arrow:active{background:#2b343e;}
  .mlabel{text-align:center;flex:1 1 auto;}
  .mlabel .m{font-size:17px;font-weight:600;text-transform:capitalize;}
  .mlabel .t{font-size:22px;font-weight:700;margin-top:1px;}
  .mlabel .cmp{font-size:12px;color:var(--muted);margin-top:1px;}
  .cmp .up{color:var(--bad);} .cmp .down{color:var(--good);}
  canvas{width:100%;display:block;}
  #chart{touch-action:none;}
  .cmprow{display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px;color:var(--muted);margin-top:2px;}
  .cmprow select{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:8px;font-size:12px;padding:3px 6px;}
  .legdot{display:inline-block;width:18px;height:3px;border-radius:2px;vertical-align:middle;}

  /* ---- tabs ---- */
  .tabs{flex:0 0 auto;display:flex;border-bottom:1px solid var(--line);background:var(--bg);}
  .tabs button{flex:1;background:none;border:none;color:var(--muted);font-size:14px;font-weight:600;padding:11px 0;border-bottom:2px solid transparent;}
  .tabs button.on{color:var(--txt);border-bottom-color:var(--accent);}

  /* ---- list ---- */
  .scroll{flex:1 1 auto;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:88px;}
  .empty{color:var(--muted);text-align:center;padding:40px 20px;font-size:14px;}
  .day-h{position:sticky;top:0;background:var(--bg);color:var(--muted);font-size:12px;padding:8px 14px 4px;display:flex;justify-content:space-between;}
  .row{display:flex;align-items:center;gap:12px;padding:9px 14px;border-bottom:1px solid var(--line);}
  .row .ic{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex:0 0 auto;}
  .row .mid{flex:1 1 auto;min-width:0;}
  .row .cat{font-size:15px;font-weight:600;}
  .row .note{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .row .amt{font-size:16px;font-weight:700;flex:0 0 auto;}
  .row .del{background:none;border:none;color:var(--bad);font-size:18px;padding:4px 2px 4px 8px;opacity:0;transition:opacity .15s;}
  .row.show-del .del{opacity:.85;}

  /* ---- pie view ---- */
  .piewrap{padding:10px 14px;}
  #pie{max-width:280px;margin:0 auto;}
  .leg{margin-top:12px;}
  .leg .li{display:flex;align-items:center;gap:10px;padding:8px 2px;border-bottom:1px solid var(--line);cursor:pointer;}
  .leg .dot{width:14px;height:14px;border-radius:4px;flex:0 0 auto;}
  .leg .nm{flex:1 1 auto;font-size:14px;}
  .leg .pc{color:var(--muted);font-size:13px;width:42px;text-align:right;}
  .leg .sm{font-size:14px;font-weight:700;width:74px;text-align:right;}
  .leg .chev{color:var(--muted);font-size:12px;width:14px;text-align:right;}
  .txlist{display:none;padding:2px 0 8px 24px;}
  .txlist.open{display:block;}
  .txr{display:flex;gap:10px;padding:5px 2px;font-size:13px;}
  .txr .d{width:44px;flex:0 0 auto;color:var(--muted);}
  .txr .n{flex:1 1 auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .txr .a{flex:0 0 auto;font-weight:600;}

  /* ---- big add button ---- */
  .addbar{position:absolute;left:0;right:0;bottom:0;padding:10px 12px calc(10px + env(safe-area-inset-bottom));background:linear-gradient(transparent,var(--bg) 28%);z-index:5;}
  .add{width:100%;height:58px;border:none;border-radius:16px;background:var(--accent);color:#fff;font-size:19px;font-weight:700;box-shadow:0 6px 20px rgba(0,0,0,.4);}
  .add:active{filter:brightness(.95);}

  /* ---- add flow overlay ---- */
  .ov{position:fixed;inset:0;background:var(--bg);z-index:20;display:none;flex-direction:column;max-width:560px;margin:0 auto;}
  .ov.open{display:flex;}
  .ovh{display:flex;align-items:center;gap:10px;padding:12px;border-bottom:1px solid var(--line);}
  .ovh button{background:none;border:none;color:var(--accent);font-size:16px;padding:6px;}
  .ovh .ttl{flex:1 1 auto;text-align:center;font-weight:600;font-size:16px;}
  .ovh .sp{width:54px;}
  .ovbody{flex:1 1 auto;overflow-y:auto;padding:10px;display:flex;flex-direction:column;}

  .cats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .cat-b{border:none;border-radius:16px;padding:18px 6px 13px;display:flex;flex-direction:column;align-items:center;gap:8px;color:#fff;font-weight:600;}
  .cat-b:active{filter:brightness(.9);}
  .cat-b .e{font-size:34px;line-height:1;}
  .cat-b .n{font-size:13px;text-align:center;line-height:1.15;}

  .amtbox{text-align:center;padding:16px 10px 4px;}
  .amtbox .picked{display:inline-flex;align-items:center;gap:8px;color:#fff;padding:6px 14px;border-radius:999px;font-size:14px;font-weight:600;}
  .amtbox .picked .e{font-size:18px;}
  .amtbox .big{font-size:54px;font-weight:700;margin:16px 0 4px;letter-spacing:1px;}
  .pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:6px 4px 8px;}
  .key{background:var(--panel);border:1px solid var(--line);border-radius:14px;height:62px;font-size:26px;font-weight:600;color:var(--txt);}
  .key:active{background:var(--panel2);}
  .next{width:100%;height:58px;border:none;border-radius:16px;background:var(--accent);color:#fff;font-size:19px;font-weight:700;margin-top:auto;}
  .next:disabled{background:var(--accent2);opacity:.6;}

  .fin{display:flex;flex-direction:column;height:100%;gap:12px;}
  .fin .summ{display:flex;align-items:center;gap:12px;border-radius:14px;padding:14px;color:#fff;}
  .fin .summ .e{font-size:30px;} .fin .summ .s2{flex:1;font-weight:600;} .fin .summ .a{font-size:22px;font-weight:800;}
  .fin label{font-size:12px;color:var(--muted);margin:2px 2px -6px;}
  .fin input{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:14px;color:var(--txt);font-size:18px;padding:14px;outline:none;}
  .fin input[type=date]{color-scheme:dark;}
  .chips{display:flex;flex-wrap:wrap;gap:8px;}
  .chip{background:var(--panel2);border:1px solid var(--line);border-radius:999px;color:var(--txt);font-size:14px;padding:8px 14px;}
  .chip:active{background:#2b343e;}
  .save{width:100%;height:62px;border:none;border-radius:16px;background:var(--good);color:#06210f;font-size:21px;font-weight:800;margin-top:auto;}
  .save:active{filter:brightness(.95);}

  .toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:#0c2a16;color:#aef0c4;border:1px solid #1d6b39;padding:10px 18px;border-radius:12px;font-size:14px;z-index:40;opacity:0;transition:opacity .2s;pointer-events:none;}
  .toast.show{opacity:1;}

  .sheet{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:30;display:none;align-items:flex-end;}
  .sheet.open{display:flex;}
  .sheet .inner{background:var(--panel);width:100%;max-width:560px;margin:0 auto;border-radius:18px 18px 0 0;padding:14px 16px calc(24px + env(safe-area-inset-bottom));}
  .sheet h3{margin:4px 0 12px;font-size:16px;}
  .sheet button{width:100%;height:50px;border-radius:12px;border:1px solid var(--line);background:var(--panel2);color:var(--txt);font-size:15px;margin-top:8px;}
</style>
</head>
<body>
<div id="app">
  <div class="top">
    <div class="nav">
      <button class="arrow" id="prev">‹</button>
      <div class="mlabel">
        <div class="m" id="mLabel">—</div>
        <div class="t" id="mTotal">0 €</div>
      </div>
      <button class="arrow" id="next">›</button>
    </div>
    <canvas id="chart" height="140"></canvas>
    <div class="cmprow">
      <select id="cmpSel"></select>
      <button class="gear" id="gear">⚙</button>
    </div>
  </div>

  <div class="tabs">
    <button id="tabList" class="on">Траты</button>
    <button id="tabPie">Категории</button>
  </div>

  <div class="scroll" id="listView"></div>
  <div class="scroll" id="pieView" style="display:none"></div>

  <div class="addbar"><button class="add" id="addBtn">+ Добавить трату</button></div>
</div>

<!-- add flow -->
<div class="ov" id="ov">
  <div class="ovh">
    <button id="ovBack">‹ Назад</button>
    <div class="ttl" id="ovTitle">Категория</div>
    <div class="sp"></div>
  </div>
  <div class="ovbody" id="ovBody"></div>
</div>

<div class="toast" id="toast">Сохранено</div>

<div class="sheet" id="sheet">
  <div class="inner">
    <h3>Данные</h3>
    <button id="exp">⬇ Экспорт в файл (бэкап)</button>
    <button id="imp">⬆ Импорт из файла</button>
    <button id="closeSheet" style="margin-top:16px;background:transparent;border:none;color:var(--muted);">Закрыть</button>
    <input type="file" id="impFile" accept="application/json" style="display:none">
  </div>
</div>

<script>
"use strict";

/* ===== категории (порядок = как на экране; правится тут) ===== */
const CATS = [
  {id:"food",  name:"Еда",                  e:"🛒", c:"#36c46b"},
  {id:"cloth", name:"Одежда",               e:"👕", c:"#a472ff"},
  {id:"cafe",  name:"Кафе",                 e:"☕", c:"#ff9f43"},
  {id:"trans", name:"Транспорт",            e:"🚗", c:"#4da3ff"},
  {id:"zhku",  name:"ЖКХ",                  e:"🏠", c:"#2bc4b4"},
  {id:"med",   name:"Врачи",                e:"🩺", c:"#ff6b6b"},
  {id:"fun",   name:"Отпуск и Развлечения", e:"🏖️", c:"#ff5fa2"},
  {id:"ivan",  name:"Иван",                 e:"👦", c:"#38c6e0"},
  {id:"mar",   name:"Марьяна",              e:"👧", c:"#f4c430"},
];
const CAT = Object.fromEntries(CATS.map(c=>[c.id,c]));

/* подсказки-чипсы под комментарием (по категориям) */
const HINTS = {
  food:  ["Билла","Кауфланд","Фантастико","СВА Коме","Другое"],
  zhku:  ["Аренда","Электричество","Вода","Отопление","Интернет","Моб Максим","Моб Карина"],
  med:   ["Аптека"],
  trans: ["Такси","ТО","Страховка","Парковка","Виньетка","Дизель"],
};

/* ===== хранилище: целые EUR, JSON + автобэкап ===== */
const KEY="budget_v2", BAK="budget_v2_bak";
function load(){
  try{ return JSON.parse(localStorage.getItem(KEY)||"[]"); }
  catch(e){ try{ return JSON.parse(localStorage.getItem(BAK)||"[]"); }catch(_){ return []; } }
}
function persist(){
  const prev=localStorage.getItem(KEY);
  if(prev) localStorage.setItem(BAK,prev);
  localStorage.setItem(KEY,JSON.stringify(entries));
}
let entries=load();

/* ===== формат / даты (без копеек) ===== */
const fmtEUR=new Intl.NumberFormat("de-DE",{style:"currency",currency:"EUR",minimumFractionDigits:0,maximumFractionDigits:0});
const fmtMonth=new Intl.DateTimeFormat("ru-RU",{month:"long",year:"numeric"});
const fmtMonShort=new Intl.DateTimeFormat("ru-RU",{month:"short",year:"2-digit"});
const fmtDay=new Intl.DateTimeFormat("ru-RU",{day:"numeric",month:"long",weekday:"short"});
const eur=v=>fmtEUR.format(v);
const stripG=s=>s.replace(/\s*г\.?$/,"");
const monLabel=d=>stripG(fmtMonth.format(d));
const monShort=d=>stripG(fmtMonShort.format(d));
function pad2(n){return String(n).padStart(2,"0");}
function todayStr(){const d=new Date();return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate());}
function partsOf(ds){const [y,m,d]=ds.split("-").map(Number);return {y,m:m-1,d};}
function daysIn(y,m){return new Date(y,m+1,0).getDate();}

let cur=new Date(); cur.setDate(1); cur.setHours(0,0,0,0);  // выбранный месяц
function shiftMonth(n){cur=new Date(cur.getFullYear(),cur.getMonth()+n,1);render();}

function cumulative(year,month){
  const dim=daysIn(year,month), arr=new Array(dim).fill(0);
  for(const e of entries){const p=partsOf(e.date); if(p.y===year&&p.m===month) arr[p.d-1]+=e.amount;}
  for(let i=1;i<dim;i++) arr[i]+=arr[i-1];
  return arr;
}
function monthTotal(year,month){let s=0;for(const e of entries){const p=partsOf(e.date);if(p.y===year&&p.m===month)s+=e.amount;}return s;}
function catTotals(year,month){
  const map={};
  for(const e of entries){const p=partsOf(e.date);if(p.y===year&&p.m===month)map[e.cat]=(map[e.cat]||0)+e.amount;}
  return CATS.filter(c=>map[c.id]>0).map(c=>({cat:c,sum:map[c.id]})).sort((a,b)=>b.sum-a.sum);
}
function getCmpYM(){
  const sel=document.getElementById("cmpSel").value;
  if(sel&&sel!=="auto"){const [y,m]=sel.split("-").map(Number);return {y,m:m-1};}
  const p=new Date(cur.getFullYear(),cur.getMonth()-1,1);
  return {y:p.getFullYear(),m:p.getMonth()};
}

/* ===== линейный график: area + скраббер пальцем ===== */
let chartState=null;
function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function drawChart(){
  const cv=document.getElementById("chart");
  const dpr=window.devicePixelRatio||1, cssW=cv.clientWidth, cssH=cv.clientHeight;
  cv.width=cssW*dpr; cv.height=cssH*dpr;
  const ctx=cv.getContext("2d"); ctx.setTransform(dpr,0,0,dpr,0,0);
  const A=cumulative(cur.getFullYear(),cur.getMonth());
  const cm=getCmpYM(), B=cumulative(cm.y,cm.m);
  const maxDays=Math.max(A.length,B.length);
  const maxVal=Math.max(A[A.length-1]||0,B[B.length-1]||0,1);
  const padL=8,padT=12,padB=16, W=cssW-padL-8, H=cssH-padT-padB;
  const X=i=>padL+(maxDays<=1?0:(i/(maxDays-1))*W), Y=v=>padT+H-(v/maxVal)*H;
  chartState={ctx,cssW,cssH,A,B,maxDays,maxVal,padL,padT,W,H,X,Y};
  paintChart(null);
}
function paintChart(hoverIdx){
  const s=chartState; if(!s) return;
  const {ctx,cssW,cssH,A,B,maxDays,maxVal,padL,padT,W,H,X,Y}=s;
  ctx.clearRect(0,0,cssW,cssH);
  ctx.strokeStyle="#222a33"; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(padL,padT+H); ctx.lineTo(padL+W,padT+H); ctx.stroke();
  if(A.length){                                   // area под текущим месяцем
    ctx.beginPath(); ctx.moveTo(X(0),Y(A[0]));
    for(let i=1;i<A.length;i++) ctx.lineTo(X(i),Y(A[i]));
    ctx.lineTo(X(A.length-1),padT+H); ctx.lineTo(X(0),padT+H); ctx.closePath();
    const g=ctx.createLinearGradient(0,padT,0,padT+H);
    g.addColorStop(0,"rgba(77,163,255,0.35)"); g.addColorStop(1,"rgba(77,163,255,0.02)");
    ctx.fillStyle=g; ctx.fill();
  }
  const line=(arr,color,dash)=>{
    if(!arr.length) return;
    ctx.setLineDash(dash||[]); ctx.strokeStyle=color; ctx.lineWidth=2.5; ctx.lineJoin="round";
    ctx.beginPath();
    for(let i=0;i<arr.length;i++){const px=X(i),py=Y(arr[i]); i?ctx.lineTo(px,py):ctx.moveTo(px,py);}
    ctx.stroke(); ctx.setLineDash([]);
  };
  line(B,"#5b6673",[5,4]); line(A,"#4da3ff",null);
  ctx.fillStyle="#6b7785"; ctx.font="11px sans-serif";
  ctx.textAlign="left"; ctx.textBaseline="middle"; ctx.fillText(eur(maxVal),padL+2,padT+5);
  ctx.textBaseline="bottom"; ctx.fillText("1",padL,cssH-2);
  ctx.textAlign="right"; ctx.fillText(String(maxDays),padL+W,cssH-2); ctx.textAlign="left";
  if(hoverIdx!=null){
    const i=Math.max(0,Math.min(maxDays-1,hoverIdx)), px=X(i);
    ctx.strokeStyle="rgba(231,237,243,0.45)"; ctx.lineWidth=1; ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(px,padT); ctx.lineTo(px,padT+H); ctx.stroke(); ctx.setLineDash([]);
    const av=(i<A.length?A[i]:null), bv=(i<B.length?B[i]:null);
    if(av!=null){ctx.fillStyle="#4da3ff";ctx.beginPath();ctx.arc(px,Y(av),4,0,7);ctx.fill();}
    if(bv!=null){ctx.fillStyle="#9aa6b2";ctx.beginPath();ctx.arc(px,Y(bv),4,0,7);ctx.fill();}
    const L=[pad2(i+1)+"."+pad2(cur.getMonth()+1),"тек: "+eur(av||0),"сравн: "+(bv!=null?eur(bv):"—")];
    ctx.font="11px sans-serif"; let tw=0; L.forEach(t=>tw=Math.max(tw,ctx.measureText(t).width));
    const bw=tw+14, bh=48; let bx=px+10; if(bx+bw>cssW-2) bx=px-10-bw; if(bx<2) bx=2; const by=padT+2;
    ctx.fillStyle="rgba(20,26,32,0.95)"; ctx.strokeStyle="#2a323c"; ctx.lineWidth=1;
    roundRect(ctx,bx,by,bw,bh,6); ctx.fill(); ctx.stroke();
    ctx.textAlign="left"; ctx.textBaseline="top";
    ctx.fillStyle="#e7edf3"; ctx.fillText(L[0],bx+7,by+6);
    ctx.fillStyle="#7fc0ff"; ctx.fillText(L[1],bx+7,by+20);
    ctx.fillStyle="#9aa6b2"; ctx.fillText(L[2],bx+7,by+34);
  }
}
(function setupScrub(){
  const cv=document.getElementById("chart"); let dragging=false;
  const at=cx=>{const s=chartState; if(!s) return; const r=cv.getBoundingClientRect();
    const i=Math.round((cx-r.left-s.padL)/(s.W||1)*(s.maxDays-1)); paintChart(i);};
  cv.addEventListener("pointerdown",e=>{dragging=true; try{cv.setPointerCapture(e.pointerId);}catch(_){} at(e.clientX);});
  cv.addEventListener("pointermove",e=>{ if(dragging) at(e.clientX); });
  const end=()=>{dragging=false; paintChart(null);};
  cv.addEventListener("pointerup",end); cv.addEventListener("pointercancel",end); cv.addEventListener("pointerleave",end);
})();

/* ===== pie ===== */
function drawPie(){
  const view=document.getElementById("pieView");
  const data=catTotals(cur.getFullYear(),cur.getMonth());
  const total=data.reduce((s,d)=>s+d.sum,0);
  if(!total){ view.innerHTML=`<div class="empty">Нет трат за этот месяц.</div>`; return; }
  view.innerHTML=`<div class="piewrap"><canvas id="pie" height="280"></canvas><div class="leg" id="leg"></div></div>`;
  const cv=document.getElementById("pie");
  const dpr=window.devicePixelRatio||1, cssW=cv.clientWidth, cssH=cv.clientHeight;
  cv.width=cssW*dpr; cv.height=cssH*dpr;
  const ctx=cv.getContext("2d"); ctx.setTransform(dpr,0,0,dpr,0,0); ctx.clearRect(0,0,cssW,cssH);
  const cx=cssW/2, cy=cssH/2, R=Math.min(cssW,cssH)/2-6;
  let a=-Math.PI/2;
  for(const d of data){
    const frac=d.sum/total, a2=a+frac*2*Math.PI;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,R,a,a2); ctx.closePath();
    ctx.fillStyle=d.cat.c; ctx.fill();
    if(frac>=0.06){
      const mid=(a+a2)/2, lr=R*0.62;
      ctx.fillStyle="#0f1216"; ctx.font="bold 12px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText(Math.round(frac*100)+"%", cx+Math.cos(mid)*lr, cy+Math.sin(mid)*lr);
    }
    a=a2;
  }
  const y=cur.getFullYear(), m=cur.getMonth();
  document.getElementById("leg").innerHTML=data.map(d=>{
    const pc=Math.round(d.sum/total*100);
    const tx=entries.filter(e=>{const p=partsOf(e.date);return p.y===y&&p.m===m&&e.cat===d.cat.id;})
      .sort((a,b)=> a.date<b.date?1 : a.date>b.date?-1 : b.ts-a.ts);
    const det=tx.map(e=>{const p=partsOf(e.date);
      return `<div class="txr"><span class="d">${pad2(p.d)}.${pad2(p.m+1)}</span>
        <span class="n">${e.note?esc(e.note):"—"}</span><span class="a">${eur(e.amount)}</span></div>`;}).join("");
    return `<div class="li" data-cat="${d.cat.id}">
        <span class="dot" style="background:${d.cat.c}"></span>
        <span class="nm">${d.cat.e} ${d.cat.name}</span>
        <span class="pc">${pc}%</span><span class="sm">${eur(d.sum)}</span><span class="chev">▸</span>
      </div>
      <div class="txlist" data-for="${d.cat.id}">${det}</div>`;
  }).join("");
  document.getElementById("leg").onclick=ev=>{
    const li=ev.target.closest(".li"); if(!li) return;
    const id=li.getAttribute("data-cat");
    const list=document.querySelector(`.txlist[data-for="${id}"]`);
    li.querySelector(".chev").textContent=list.classList.toggle("open")?"▾":"▸";
  };
}

/* ===== рендер ===== */
function buildCmpOptions(){
  const sel=document.getElementById("cmpSel"), keep=sel.value||"auto";
  const curKey=cur.getFullYear()+"-"+pad2(cur.getMonth()+1);
  const set=new Set(entries.map(e=>{const p=partsOf(e.date);return p.y+"-"+pad2(p.m+1);}));
  const months=[...set].filter(k=>k<curKey).sort().reverse();   // только месяцы в прошлом
  sel.innerHTML=`<option value="auto">пред. месяцем</option>`+
    months.map(k=>{const [y,m]=k.split("-").map(Number);return `<option value="${k}">${monShort(new Date(y,m-1,1))}</option>`;}).join("");
  sel.value=[...sel.options].some(o=>o.value===keep)?keep:"auto";
}

function render(){
  const y=cur.getFullYear(), m=cur.getMonth();
  document.getElementById("mLabel").textContent=monLabel(cur);
  const tot=monthTotal(y,m);
  document.getElementById("mTotal").textContent=eur(tot);

  buildCmpOptions();

  // список
  const rows=entries.filter(e=>{const p=partsOf(e.date);return p.y===y&&p.m===m;})
    .sort((a,b)=> a.date<b.date?1 : a.date>b.date?-1 : b.ts-a.ts);
  const lv=document.getElementById("listView");
  if(!rows.length){ lv.innerHTML=`<div class="empty">Нет трат за этот месяц.<br>Нажми «+ Добавить трату».</div>`; }
  else{
    let html="", lastDay="";
    for(const e of rows){
      if(e.date!==lastDay){
        lastDay=e.date;
        const p=partsOf(e.date);
        html+=`<div class="day-h"><span>${fmtDay.format(new Date(p.y,p.m,p.d))}</span></div>`;
      }
      const c=CAT[e.cat]||{e:"❓",name:e.cat,c:"#555"};
      html+=`<div class="row" data-id="${e.id}">
        <div class="ic" style="background:${c.c}33">${c.e}</div>
        <div class="mid"><div class="cat">${c.name}</div>${e.note?`<div class="note">${esc(e.note)}</div>`:""}</div>
        <div class="amt">${eur(e.amount)}</div>
        <button class="del" data-del="${e.id}">🗑</button></div>`;
    }
    lv.innerHTML=html;
  }
  drawChart();
  if(document.getElementById("pieView").style.display!=="none") drawPie();
}
function esc(s){return s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

/* ===== табы ===== */
function showTab(pie){
  document.getElementById("tabPie").classList.toggle("on",pie);
  document.getElementById("tabList").classList.toggle("on",!pie);
  document.getElementById("pieView").style.display=pie?"block":"none";
  document.getElementById("listView").style.display=pie?"none":"block";
  if(pie) drawPie();
}
document.getElementById("tabList").onclick=()=>showTab(false);
document.getElementById("tabPie").onclick=()=>showTab(true);

/* ===== удаление ===== */
document.getElementById("listView").addEventListener("click",e=>{
  const del=e.target.closest("[data-del]");
  if(del){ if(confirm("Удалить эту трату?")){ entries=entries.filter(x=>x.id!==del.getAttribute("data-del")); persist(); render(); } return; }
  const row=e.target.closest(".row"); if(row) row.classList.toggle("show-del");
});

/* ===== flow добавления ===== */
let draft=null;
const ov=document.getElementById("ov"), ovBody=document.getElementById("ovBody"), ovTitle=document.getElementById("ovTitle");
function defaultDate(){
  const now=new Date();
  if(cur.getFullYear()===now.getFullYear()&&cur.getMonth()===now.getMonth()) return todayStr();
  return cur.getFullYear()+"-"+pad2(cur.getMonth()+1)+"-"+pad2(daysIn(cur.getFullYear(),cur.getMonth()));
}
function openFlow(){ draft={cat:null,amount:0,note:"",date:defaultDate(),step:"cat"}; stepCat(); ov.classList.add("open"); }
function closeFlow(){ ov.classList.remove("open"); draft=null; }
document.getElementById("ovBack").onclick=()=>{
  if(!draft) return closeFlow();
  if(draft.step==="fin") return stepAmount();
  if(draft.step==="amount") return stepCat();
  closeFlow();
};

function stepCat(){
  draft.step="cat"; ovTitle.textContent="Категория";
  ovBody.innerHTML=`<div class="cats">${CATS.map(c=>
    `<button class="cat-b" data-cat="${c.id}" style="background:${c.c}"><span class="e">${c.e}</span><span class="n">${c.name}</span></button>`).join("")}</div>`;
  ovBody.querySelectorAll("[data-cat]").forEach(b=>b.onclick=()=>{draft.cat=b.getAttribute("data-cat");stepAmount();});
}

function stepAmount(){
  draft.step="amount"; ovTitle.textContent="Сумма";
  const c=CAT[draft.cat];
  ovBody.innerHTML=`
    <div class="amtbox">
      <span class="picked" style="background:${c.c}"><span class="e">${c.e}</span>${c.name}</span>
      <div class="big" id="amtBig">0 €</div>
    </div>
    <div class="pad" id="pad">
      ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="key" data-k="${n}">${n}</button>`).join("")}
      <button class="key" data-k="del">⌫</button>
      <button class="key" data-k="0">0</button>
      <button class="key" data-k="00">00</button>
    </div>
    <button class="next" id="amtNext" ${draft.amount?"":"disabled"}>Дальше ›</button>`;
  const big=document.getElementById("amtBig"), nx=document.getElementById("amtNext");
  const upd=()=>{ big.textContent=eur(draft.amount); nx.disabled=draft.amount===0; };
  upd();
  document.getElementById("pad").querySelectorAll("[data-k]").forEach(b=>b.onclick=()=>{
    const k=b.getAttribute("data-k");
    if(k==="del") draft.amount=Math.floor(draft.amount/10);
    else if(k==="00") draft.amount=Math.min(draft.amount*100,9_999_999);
    else draft.amount=Math.min(draft.amount*10+Number(k),9_999_999);
    upd();
  });
  nx.onclick=()=>{ if(draft.amount>0) stepFin(); };
}

function stepFin(){
  draft.step="fin"; ovTitle.textContent="Детали";
  const c=CAT[draft.cat];
  ovBody.innerHTML=`
    <div class="fin">
      <div class="summ" style="background:${c.c}">
        <span class="e">${c.e}</span><div class="s2">${c.name}</div><span class="a">${eur(draft.amount)}</span>
      </div>
      <label>Дата</label>
      <input id="dateInp" type="date" value="${draft.date}">
      <label>Комментарий</label>
      <input id="noteInp" type="text" inputmode="text" placeholder="Комментарий" value="${esc(draft.note)}">
      <div class="chips" id="chips">${(HINTS[draft.cat]||[]).map(h=>`<button type="button" class="chip" data-h="${esc(h)}">${esc(h)}</button>`).join("")}</div>
      <button class="save" id="saveBtn">СОХРАНИТЬ ✓</button>
    </div>`;
  const inp=document.getElementById("noteInp");
  inp.focus();
  inp.addEventListener("keydown",ev=>{ if(ev.key==="Enter"){ ev.preventDefault(); doSave(); } });
  const chips=document.getElementById("chips");
  chips.querySelectorAll("[data-h]").forEach(b=>b.onclick=()=>{ inp.value=b.getAttribute("data-h"); doSave(); });
  document.getElementById("saveBtn").onclick=doSave;
}
function doSave(){
  draft.note=document.getElementById("noteInp").value.trim();
  draft.date=document.getElementById("dateInp").value||todayStr();
  entries.push({id:String(Date.now())+Math.random().toString(36).slice(2,6),
                ts:Date.now(), date:draft.date, cat:draft.cat, amount:draft.amount, note:draft.note});
  persist();
  const p=partsOf(draft.date); cur=new Date(p.y,p.m,1);   // показать месяц добавленной траты
  closeFlow(); render(); toast();
}
function toast(){const t=document.getElementById("toast");t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1300);}

/* ===== навигация / настройки ===== */
document.getElementById("prev").onclick=()=>shiftMonth(-1);
document.getElementById("next").onclick=()=>shiftMonth(1);
document.getElementById("addBtn").onclick=openFlow;
document.getElementById("cmpSel").onchange=render;
window.addEventListener("resize",()=>{drawChart(); if(document.getElementById("pieView").style.display!=="none") drawPie();});

const sheet=document.getElementById("sheet");
document.getElementById("gear").onclick=()=>sheet.classList.add("open");
document.getElementById("closeSheet").onclick=()=>sheet.classList.remove("open");
sheet.addEventListener("click",e=>{ if(e.target===sheet) sheet.classList.remove("open"); });
document.getElementById("exp").onclick=()=>{
  const blob=new Blob([JSON.stringify(entries,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="budget-"+todayStr()+".json"; a.click(); URL.revokeObjectURL(a.href);
};
document.getElementById("imp").onclick=()=>document.getElementById("impFile").click();
document.getElementById("impFile").onchange=ev=>{
  const f=ev.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{
    const data=JSON.parse(r.result); if(!Array.isArray(data)) throw 0;
    if(confirm("Импорт заменит текущие данные ("+entries.length+" → "+data.length+"). Продолжить?")){
      entries=data; persist(); sheet.classList.remove("open"); render();
    }
  }catch(e){ alert("Не удалось прочитать файл."); } };
  r.readAsText(f);
};

/* ===== PWA service worker + авто-обновление ===== */
if("serviceWorker" in navigator && location.protocol.startsWith("http")){
  const hadController = !!navigator.serviceWorker.controller;
  let refreshing=false;
  navigator.serviceWorker.addEventListener("controllerchange",()=>{
    if(refreshing || !hadController) return;   // не перезагружаем при самой первой установке
    refreshing=true; location.reload();
  });
  navigator.serviceWorker.register("sw.js").then(reg=>reg.update()).catch(()=>{});
}

render();
</script>
</body>
</html>
